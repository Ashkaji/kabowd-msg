services:
  # =========================
  # N8N - Workflow Automation
  # =========================
  - type: web
    name: n8n
    env: docker
    plan: starter
    dockerfilePath: ./n8n/Dockerfile
    region: frankfurt
    envVars:
      - key: N8N_HOST
        value: n8n.onrender.com
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com/
      - key: GENERIC_TIMEZONE
        value: Africa/Lome
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: DB_TYPE
        value: sqlite
      - key: DB_SQLITE_FILENAME
        value: /data/n8n.sqlite

  # =========================
  # WAHA - WhatsApp HTTP API
  # =========================
  - type: web
    name: waha
    env: docker
    plan: starter
    dockerfilePath: ./waha/Dockerfile
    region: frankfurt
    envVars:
      # --- Réseau & Port ---
      - key: PORT
        value: 3000
      - key: WAHA_BASE_URL
        value: https://waha.onrender.com     # ⚠️ Mettre à jour avec l'URL Render réelle

      # --- Sécurité : API Key & Dashboard ---
      # ⚠️ Ces valeurs sensibles doivent être surchargées via les "Secret Files" ou
      #    l'interface Render (Environment > Secret) pour ne pas apparaître en clair.
      - key: WAHA_API_KEY
        value: sk_live_51NxA2B3C4D5E6F7G8H9I0J
      - key: WAHA_DASHBOARD_ENABLED
        value: "true"
      - key: WAHA_DASHBOARD_USERNAME
        value: admin_waha
      - key: WAHA_DASHBOARD_PASSWORD
        value: SuperSecurePass2026!

      # --- Swagger ---
      - key: WHATSAPP_SWAGGER_ENABLED
        value: "false"

      # --- Session & Moteur WhatsApp ---
      - key: WHATSAPP_DEFAULT_ENGINE
        value: NOWEB
      - key: WAHA_SESSION_NAME
        value: default
      - key: WHATSAPP_START_SESSION
        value: session_production_01
      - key: WAHA_RESTART_ALL_SESSIONS
        value: "true"
      - key: WHATSAPP_SESSION_NOT_START_AND_WAIT
        value: "true"
      - key: WAHA_BROWSER_HEADLESS
        value: "true"
      - key: WAHA_PRINT_QR
        value: "true"

      # --- Webhooks ---
      - key: WAHA_HOOK_URL
        value: https://n8n.onrender.com/webhook/waha
      - key: WAHA_HOOK_EVENTS
        value: "message,message.reaction,presence.update,chat.update"

      # --- Médias & Stockage ---
      - key: WAHA_MEDIA_STORAGE
        value: local
      - key: WAHA_LOCAL_STORE_BASE_DIR
        value: /var/lib/waha/storage
      - key: WHATSAPP_FILES_FOLDER
        value: /app/whatsapp_files
      - key: WHATSAPP_FILES_LIFETIME
        value: 86400

      # --- Logs ---
      - key: WAHA_LOG_FORMAT
        value: json
      - key: WAHA_LOG_LEVEL
        value: info
